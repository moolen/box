name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install Linux integration test host tooling
        run: |
          set -euxo pipefail

          RUNSC_VERSION="20260406.0"
          RUNSC_BASE_URL="https://storage.googleapis.com/gvisor/releases/release/${RUNSC_VERSION}/x86_64"

          missing_pkgs=()
          for cmd in curl ip nft skopeo; do
            if ! command -v "${cmd}" >/dev/null 2>&1; then
              case "${cmd}" in
                curl) missing_pkgs+=(ca-certificates curl) ;;
                ip) missing_pkgs+=(iproute2) ;;
                nft) missing_pkgs+=(nftables) ;;
                skopeo) missing_pkgs+=(skopeo) ;;
              esac
            fi
          done

          if ! command -v docker >/dev/null 2>&1 || ! command -v dockerd >/dev/null 2>&1; then
            missing_pkgs+=(docker.io uidmap)
          fi

          if [ "${#missing_pkgs[@]}" -gt 0 ]; then
            declare -A dedup=()
            pkgs=()
            for pkg in "${missing_pkgs[@]}"; do
              if [ -z "${dedup[${pkg}]+x}" ]; then
                dedup["${pkg}"]=1
                pkgs+=("${pkg}")
              fi
            done
            sudo apt-get update
            sudo apt-get install -y "${pkgs[@]}"
          fi

          if systemctl list-unit-files | grep -q '^docker\.service'; then
            sudo systemctl start docker
          fi

          curl -fsSL -o /tmp/runsc "${RUNSC_BASE_URL}/runsc"
          curl -fsSL -o /tmp/runsc.sha512 "${RUNSC_BASE_URL}/runsc.sha512"
          (cd /tmp && sha512sum -c runsc.sha512)

          curl -fsSL -o /tmp/containerd-shim-runsc-v1 "${RUNSC_BASE_URL}/containerd-shim-runsc-v1"
          curl -fsSL -o /tmp/containerd-shim-runsc-v1.sha512 "${RUNSC_BASE_URL}/containerd-shim-runsc-v1.sha512"
          (cd /tmp && sha512sum -c containerd-shim-runsc-v1.sha512)

          chmod +x /tmp/runsc /tmp/containerd-shim-runsc-v1
          sudo install -m 0755 /tmp/runsc /usr/local/bin/runsc
          sudo install -m 0755 /tmp/containerd-shim-runsc-v1 /usr/local/bin/containerd-shim-runsc-v1

          runsc --version
          docker --version
          dockerd --version
          skopeo --version

      - name: Set up Node.js for OpenCode
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenCode in custom prefix
        run: |
          set -euxo pipefail
          OPENCODE_PREFIX="${RUNNER_TEMP}/opencode-prefix"
          npm install --global --prefix "${OPENCODE_PREFIX}" opencode-ai@1.4.3
          OPENCODE_REAL_BIN="$(find "${OPENCODE_PREFIX}/lib/node_modules/opencode-ai/node_modules" -path '*/bin/opencode' -type f | head -n1)"
          test -n "${OPENCODE_REAL_BIN}"
          cp "${OPENCODE_REAL_BIN}" "${OPENCODE_PREFIX}/bin/opencode"
          chmod +x "${OPENCODE_PREFIX}/bin/opencode"
          echo "${OPENCODE_PREFIX}/bin" >> "${GITHUB_PATH}"
          OPENCODE_BIN="${OPENCODE_PREFIX}/bin/opencode"
          echo "OpenCode bin: ${OPENCODE_BIN}"
          file "${OPENCODE_BIN}"
          "${OPENCODE_BIN}" --version

      - name: Verify OpenCode on PATH
        run: |
          set -euxo pipefail
          command -v opencode
          opencode --version

      - name: Test
        run: go test ./... -count=1

      - name: Build
        run: make build
