name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Configure git identity
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Derive deterministic tag
        id: version
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=12 "$GITHUB_SHA")"
          commit_ts="$(git show -s --format=%ct "$GITHUB_SHA")"
          tag="v0.0.0-${commit_ts}-${short_sha}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag exists (idempotent)
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --tags origin
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin; reusing."
          else
            git tag -a "${TAG}" "${GITHUB_SHA}" -m "Release ${TAG}"
            git push origin "refs/tags/${TAG}"
          fi

      - name: Build release archives
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist

          for arch in amd64 arm64; do
            target_dir="dist/box_linux_${arch}"
            mkdir -p "${target_dir}"
            GOOS=linux GOARCH="${arch}" CGO_ENABLED=0 go build -trimpath -o "${target_dir}/box" ./cmd/box
            GOOS=linux GOARCH="${arch}" CGO_ENABLED=0 go build -trimpath -o "${target_dir}/box-initshim" ./internal/initshim
            go run ./cmd/envoypack --output "${target_dir}/envoy" --platform "linux/${arch}"
            tar -C "${target_dir}" -czf "dist/box_linux_${arch}.tar.gz" box box-initshim envoy
          done

          (
            cd dist
            sha256sum box_linux_amd64.tar.gz box_linux_arm64.tar.gz > SHA256SUMS
          )

      - name: Publish or update GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          commit: ${{ github.sha }}
          generateReleaseNotes: true
          allowUpdates: true
          updateOnlyUnreleased: false
          replacesArtifacts: true
          artifacts: dist/box_linux_amd64.tar.gz,dist/box_linux_arm64.tar.gz,dist/SHA256SUMS
