# Default box configuration for local use and CI.
# `box` reads this file from the current directory unless `--config` is set.

sandbox:
  # `host-overlay` reuses host tooling read-only and bind-mounts the repo read-write.
  rootfs: host-overlay

  # Hostname visible inside the sandbox.
  hostname: box

  # `.` means the current working tree path on the host.
  # Relative paths are resolved against the invocation directory.
  workdir: .

  # When true, the workdir is mounted through a copy-on-write overlay so
  # sandbox writes do not modify the host checkout.
  workdir_overlay: true

  # When true, start from the host process environment.
  # Entries in `env` still override inherited values.
  inherit_env: true

  # Extra environment variables injected into the sandbox process.
  env:
    # Example when using mounts.staged_rw for Codex config projection:
    - CODEX_HOME=/run/box/codex-home

  # Everything after `box --` is shell-escaped and passed as one command string here.
  command_shell: /bin/bash -lc

network:
  # `monitor` records policy verdicts and prints a traffic summary.
  # Use `enforce` to deny traffic that does not match `network.policy`.
  mode: monitor

  # IPv4 pool that `box` allocates per-sandbox /30 point-to-point links from.
  subnet: 100.96.0.0/24

  dns:
    # Upstreams that the host-side DNS interceptor forwards to.
    upstream:
      - 1.1.1.1:53
      - 8.8.8.8:53

  # Egress policy rules enforced by the host-managed network layer.
  policy:
    - hostname: "*.openai.azure.com"
      ports: [443]
    - hostname: "*.chatgpt.com"
      ports: [443]
    - hostname: "chatgpt.com"
      ports: [443]
    - hostname: "*.github.com"
      ports: [443]
    - hostname: "github.com"
      ports: [443]
    - hostname: example.com
      ports: [443]
    - hostname: zeit.de
      ports: [80]
      http:
        path:
          - /index

mounts:
  # Extra host paths to bind read-only or read-write into the sandbox.
  # Use absolute host paths.
  extra_ro: []
  extra_rw: []

  # Stage selected host files into sandbox paths without exposing the whole host
  # directory. `source` may be absolute, relative to the invocation directory, or
  # under `~/...`. `target` must be an absolute sandbox path.
  #
  # Example for Codex config projection:
  # staged_rw:
  #   - source: ~/.codex/config.toml
  #     target: /run/box/codex-home/config.toml
  #     mode: 0600
  #   - source: ~/.codex/auth.json
  #     target: /run/box/codex-home/auth.json
  #     mode: 0600
  #     optional: true
  #   - source: ~/.codex/managed_config.toml
  #     target: /run/box/codex-home/managed_config.toml
  #     mode: 0600
  #     optional: true
  staged_ro: []
  staged_rw:
    - source: ~/.codex/config.toml
      target: /run/box/codex-home/config.toml
      mode: 0600
      optional: true
    - source: ~/.codex/auth.json
      target: /run/box/codex-home/auth.json
      mode: 0600
      optional: true

gvisor:
  # gVisor platform passed to `runsc`.
  platform: ptrace
