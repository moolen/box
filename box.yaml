# Default box configuration for local use and CI.
# `box` reads this file from the current directory unless `--config` is set.

sandbox:
  # `host-overlay` reuses host tooling read-only and bind-mounts the repo read-write.
  # `image` uses an unpacked rootfs from `rootfs_source`.
  rootfs: host-overlay

  # Required when `rootfs: image`.
  rootfs_source: ""

  # Hostname visible inside the sandbox.
  hostname: box

  # `.` means the current working tree path on the host.
  # Relative paths are resolved against the invocation directory.
  workdir: .

  # When true, the workdir is mounted through a copy-on-write overlay so
  # sandbox writes do not modify the host checkout.
  workdir_overlay: true

  # When true, start from the host process environment.
  # Entries in `env` still override inherited values.
  inherit_env: false

  # Extra environment variables injected into the sandbox process.
  env:
    - "PS1=box# "
    - TERM=xterm

  # Everything after `box --` is shell-escaped and passed as one command string here.
  command_shell: /bin/bash -ilc

network:
  # `monitor` is observation-only. It does not restrict general egress.
  # Use `enforce` for DNS-gated egress controls.
  mode: monitor

  # IPv4 pool that `box` allocates per-sandbox /30 point-to-point links from.
  subnet: 100.96.0.0/24

  dns:
    # `auto` binds port 53 on the sandbox gateway IP in managed network modes.
    # You can also pin a port with values such as `127.0.0.1:1053`.
    bind_addr: auto

    # Upstreams that the host-side DNS interceptor forwards to.
    upstream:
      - 1.1.1.1:53
      - 8.8.8.8:53

  envoy:
    # Enables host-side interception for HTTP and TLS.
    enabled: true

    # `peek` logs HTTP metadata and TLS SNI without full TLS MITM.
    # `mitm` is rejected by the runtime today.
    mode: peek

    # Host listener ports used by the proxy listeners.
    http_port: 18080
    tls_port: 18443

  # Egress policy rules enforced by the host-managed network layer.
  policy: []

mounts:
  # Extra host paths to bind read-only or read-write into the sandbox.
  # Use absolute host paths.
  extra_ro: []
  extra_rw: []

gvisor:
  # gVisor platform passed to `runsc`.
  platform: systrap

  # gVisor networking mode. Keep `sandbox` for the current host-managed netns path.
  network: sandbox

  # Reserved for additional runtime debugging later.
  debug: false
